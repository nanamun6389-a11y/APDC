<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Results</title><link rel="stylesheet" href="style.css?v=5"></head><body><div id="nav"></div><main class="wrap">
<section class="hero">
  <h1>Results</h1>
  <p>같이 진행한 경기는 EVENT GROUP으로 묶어 보고, 심사와 결과는 각 EVENT별로 따로 확인합니다.</p>
</section>

<section class="panel">
  <h2>EVENT GROUP</h2>
  <select id="groupSelect" class="select"></select>
  <div id="groupEvents" class="event-tabs" style="margin-top:14px"></div>
</section>

<div class="grid2">
  <section class="panel">
    <h2>심사 결과 불러오기</h2>
    <div id="selectedEventTitle" class="bigtitle" style="font-size:28px;margin-bottom:14px"></div>
    <div id="judgeData"></div>
    <button id="calculate" class="btn dark" style="width:100%;margin-top:14px">3명 심사 결과로 결과 확정</button>
    <div id="resultMsg" class="notice">각 EVENT는 별도로 계산됩니다.</div>
  </section>

  <section class="panel">
    <div class="results-head">
      <h2>공개 결과</h2>
      <div class="results-actions">
        <button id="csvBtn" class="btn">CSV</button>
        <button id="printBtn" class="btn dark">인쇄</button>
      </div>
    </div>
    <div id="published"></div>
  </section>
</div>
</main><script src="shared.js"></script><script>if(sessionStorage.getItem('apdc_mini_admin_ok')!=='1'){location.replace('admin.html');}</script><script>
document.getElementById('nav').innerHTML=nav('results');

const groupSelect=document.getElementById('groupSelect');
const groupEvents=document.getElementById('groupEvents');
const selectedEventTitle=document.getElementById('selectedEventTitle');
const judgeData=document.getElementById('judgeData');
const calculate=document.getElementById('calculate');
const resultMsg=document.getElementById('resultMsg');
const published=document.getElementById('published');
const csvBtn=document.getElementById('csvBtn');
const printBtn=document.getElementById('printBtn');

let GROUPS=[];
let GI=0;
let EI=0;

const JUDGES=[
  {key:'Kim Tae Won',label:'김태원',aliases:['김태원']},
  {key:'Mangnanyong',label:'망나뇽',aliases:['망나뇽']},
  {key:'Moon Nana',label:'문나나',aliases:['문나나']}
];

const SCORE_STORE=(typeof SCORE_KEY!=='undefined'?SCORE_KEY:'apdc_mini_scores_v1');
const RESULT_STORE=(typeof RESULT_KEY!=='undefined'?RESULT_KEY:'apdc_mini_results_v1');

function readJSON(key){
  try{
    if(typeof loadJSON==='function') return loadJSON(key)||{};
    return JSON.parse(localStorage.getItem(key)||'{}');
  }catch(e){ return {}; }
}
function writeJSON(key,val){
  try{
    if(typeof saveJSON==='function') return saveJSON(key,val);
    localStorage.setItem(key,JSON.stringify(val));
  }catch(e){ console.error(e); }
}
function currentGroup(){ return GROUPS[GI]||null; }
function currentEvent(){
  const g=currentGroup();
  return g && Array.isArray(g.events) ? g.events[EI] : null;
}
function stableKey(name,eventNo){
  return 'APDC_STABLE|'+name+'|'+String(eventNo);
}
function candidatePrimaryKeys(name,eventNo){
  const keys=[];
  try{ if(typeof eventKey==='function') keys.push(eventKey(name,eventNo)); }catch(e){}
  keys.push(
    String(name)+'|'+String(eventNo),
    String(name)+'||'+String(eventNo),
    String(eventNo)+'|'+String(name)
  );
  return [...new Set(keys)];
}
function getJudgeScore(scores,judge,eventNo){
  // 1) Stable mirror keys saved by patched Judge
  for(const name of [judge.key,...judge.aliases]){
    const stable=scores[stableKey(name,eventNo)];
    if(stable && typeof stable==='object') return stable;
  }

  // 2) Existing eventKey formats
  for(const name of [judge.key,...judge.aliases]){
    for(const k of candidatePrimaryKeys(name,eventNo)){
      const s=scores[k];
      if(s && typeof s==='object') return s;
    }
  }

  // 3) Last-resort scan for older keys containing judge + event number
  const eventText=String(eventNo);
  for(const [k,v] of Object.entries(scores||{})){
    if(!v || typeof v!=='object') continue;
    const low=String(k).toLowerCase();
    const judgeMatch=[judge.key,...judge.aliases].some(n=>low.includes(String(n).toLowerCase()));
    const eventMatch=low.split(/[^0-9]+/).includes(eventText);
    if(judgeMatch && eventMatch) return v;
  }
  return {};
}
function getRank(score,backNo){
  return score[String(backNo)] ?? score[backNo] ?? null;
}
function judgeSubmitted(scores,judge,e){
  const s=getJudgeScore(scores,judge,e.no);
  return (e.entries||[]).length>0 && (e.entries||[]).every(p=>Number(getRank(s,p.backNo))>0);
}
function resultKeySafe(eventNo){
  try{ if(typeof resultKey==='function') return resultKey(eventNo); }catch(e){}
  return String(eventNo);
}

function buildGroupLabel(g,index){
  const titles=(g.events||[]).map(e=>e.title).filter(Boolean);
  return 'GROUP '+String(g.groupNo ?? index+1).padStart(2,'0')+' · '+titles.join(' / ');
}

function renderGroupList(){
  groupSelect.innerHTML=GROUPS.map((g,i)=>`<option value="${i}">${buildGroupLabel(g,i)}</option>`).join('');
  groupSelect.value=GI;
}

function render(){
  const g=currentGroup();
  if(!g){
    judgeData.innerHTML='<div class="notice">EVENT GROUP 데이터를 불러오지 못했습니다.</div>';
    return;
  }
  EI=Math.max(0,Math.min(EI,(g.events||[]).length-1));
  const e=currentEvent();
  if(!e)return;

  const scores=readJSON(SCORE_STORE);

  groupEvents.innerHTML=(g.events||[]).map((x,i)=>{
    const doneCount=JUDGES.filter(j=>judgeSubmitted(scores,j,x)).length;
    return `<button type="button" class="event-tab ${i===EI?'active':''}" data-i="${i}">
      <span>EVENT ${String(x.no).padStart(2,'0')}</span>
      <small>${x.title||''} · ${doneCount}/3 심사완료</small>
    </button>`;
  }).join('');

  groupEvents.querySelectorAll('.event-tab').forEach(btn=>{
    btn.onclick=()=>{ EI=Number(btn.dataset.i); render(); };
  });

  selectedEventTitle.textContent='EVENT '+String(e.no).padStart(2,'0')+' · '+(e.title||'');

  judgeData.innerHTML=JUDGES.map(j=>{
    const s=getJudgeScore(scores,j,e.no);
    const done=judgeSubmitted(scores,j,e);
    return `<div class="event-card">
      <b>${j.label}</b>
      <div class="meta">${done?'✓ 제출완료':'○ 미제출'}</div>
      ${(e.entries||[]).map(p=>{
        const rank=getRank(s,p.backNo);
        return `<div class="meta">${p.backNo} · ${p.name}: ${rank?rank+'위':'-'}</div>`;
      }).join('')}
    </div>`;
  }).join('');

  const result=readJSON(RESULT_STORE)[resultKeySafe(e.no)];
  published.innerHTML=result && result.length
    ?result.map((x,idx)=>`<div class="result-row"><b>${idx+1}위</b><span>${x.backNo}</span><strong>${x.name}</strong></div>`).join('')
    :'아직 확정된 결과가 없습니다.';

  const submittedCount=JUDGES.filter(j=>judgeSubmitted(scores,j,e)).length;
  resultMsg.textContent='현재 심사 제출 '+submittedCount+'/3';
}

groupSelect.onchange=()=>{
  GI=Number(groupSelect.value);
  EI=0;
  render();
};

fetch('running_groups.json')
  .then(r=>{ if(!r.ok) throw new Error('running_groups.json '+r.status); return r.json(); })
  .then(data=>{
    GROUPS=Array.isArray(data)?data:[];
    renderGroupList();
    render();
  })
  .catch(err=>{
    console.error(err);
    judgeData.innerHTML='<div class="notice">EVENT GROUP 데이터를 불러오지 못했습니다.</div>';
  });

calculate.onclick=()=>{
  const e=currentEvent();
  if(!e)return;
  const scores=readJSON(SCORE_STORE);
  const missing=JUDGES.filter(j=>!judgeSubmitted(scores,j,e));
  if(missing.length){
    alert('아직 심사를 제출하지 않은 심사위원: '+missing.map(j=>j.label).join(', '));
    return;
  }

  const rows=(e.entries||[]).map(p=>{
    const vals=JUDGES.map(j=>Number(getRank(getJudgeScore(scores,j,e.no),p.backNo))).filter(v=>v>0);
    return {
      backNo:p.backNo,
      name:p.name,
      avg:vals.reduce((a,b)=>a+b,0)/vals.length
    };
  }).sort((a,b)=>a.avg-b.avg || Number(a.backNo)-Number(b.backNo));

  const all=readJSON(RESULT_STORE);
  all[resultKeySafe(e.no)]=rows;
  writeJSON(RESULT_STORE,all);
  resultMsg.textContent='EVENT '+String(e.no).padStart(2,'0')+' 결과가 확정되었습니다. ✓';
  render();
};

csvBtn.onclick=()=>{
  const e=currentEvent();
  if(!e)return;
  const rows=readJSON(RESULT_STORE)[resultKeySafe(e.no)]||[];
  if(!rows.length){ alert('확정된 결과가 없습니다.'); return; }
  const data=[['EVENT','RANK','BACK NO.','COMPETITOR / TEAM'],...rows.map((x,i)=>[e.no,i+1,x.backNo,x.name])];
  const csv='\ufeff'+data.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='APDC_EVENT_'+String(e.no).padStart(2,'0')+'_RESULT.csv';
  a.click();
  URL.revokeObjectURL(a.href);
};
printBtn.onclick=()=>window.print();
</script></body></html>
