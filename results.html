<!doctype html><html lang="ko"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Results</title><link rel="stylesheet" href="style-v4.css?v=4"></head><body class="">
<script src="data-v4.js?v=4"></script><script src="app-v4.js?v=4"></script><script>requireAdmin();</script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Results</h1><p>GROUP으로 묶어 보고, 결과는 각 EVENT별로 따로 계산합니다.</p></section>
<section class="panel"><h2>EVENT GROUP</h2><select id="groupSelect" class="select"></select><div id="eventTabs" class="event-tabs" style="margin-top:14px"></div></section>
<div class="grid2"><section class="panel"><h2>심사 결과</h2><div class="bigtitle" id="selectedTitle" style="font-size:30px"></div><div id="judgeData"></div><button id="calcBtn" class="btn dark" style="width:100%;margin-top:14px">3명 결과로 확정</button><div id="msg" class="notice"></div></section><section class="panel"><h2>확정 결과</h2><div id="published"></div></section></div></main>
<script>
q('nav').innerHTML=nav('results');let G=allGroups(),GI=0,EI=0;
q('groupSelect').innerHTML=G.map((g,i)=>`<option value="${i}">GROUP ${String(g.groupNo).padStart(2,'0')} · ${g.title}</option>`).join('');q('groupSelect').onchange=()=>{GI=+q('groupSelect').value;EI=0;render()};
function cur(){return G[GI].events[EI]}function judgeScore(j,e){return getScores()[scoreKey(j.key,e.no)]||{}}function done(j,e){let s=judgeScore(j,e);return e.entries.length&&e.entries.every(p=>Number(s[String(p.backNo)])>0)}
function render(){let g=G[GI],e=cur(),scores=getScores();q('eventTabs').innerHTML=g.events.map((x,i)=>`<button class="event-tab ${i===EI?'active':''}" data-i="${i}">EVENT ${String(x.no).padStart(2,'0')}<br><small>${APDC_JUDGES.filter(j=>done(j,x)).length}/3 제출</small></button>`).join('');document.querySelectorAll('.event-tab').forEach(b=>b.onclick=()=>{EI=+b.dataset.i;render()});q('selectedTitle').textContent='EVENT '+String(e.no).padStart(2,'0')+' · '+e.title;q('judgeData').innerHTML=APDC_JUDGES.map(j=>{let s=judgeScore(j,e);return `<div class="card"><b>${j.label}</b><div class="meta">${done(j,e)?'✓ 제출완료':'○ 미제출'}</div>${e.entries.map(p=>`<div class="meta">${p.backNo} · ${p.name}: ${s[String(p.backNo)]?s[String(p.backNo)]+'위':'-'}</div>`).join('')}</div>`}).join('');let r=getResults()[String(e.no)];q('published').innerHTML=r?r.map((x,i)=>`<div class="result-row"><b>${i+1}위</b><span>${x.backNo}</span><strong>${x.name}</strong></div>`).join(''):'아직 확정된 결과가 없습니다.';q('msg').textContent='현재 제출 '+APDC_JUDGES.filter(j=>done(j,e)).length+'/3';}
q('calcBtn').onclick=()=>{let e=cur(),missing=APDC_JUDGES.filter(j=>!done(j,e));if(missing.length){alert('미제출 심사위원: '+missing.map(x=>x.label).join(', '));return}let rows=e.entries.map(p=>{let vals=APDC_JUDGES.map(j=>Number(judgeScore(j,e)[String(p.backNo)]));return {backNo:p.backNo,name:p.name,avg:vals.reduce((a,b)=>a+b,0)/vals.length}}).sort((a,b)=>a.avg-b.avg||a.backNo-b.backNo);let all=getResults();all[String(e.no)]=rows;saveResults(all);q('msg').textContent='결과가 확정되었습니다. ✓';render()};render();
</script></body></html>
