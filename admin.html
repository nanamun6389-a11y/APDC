<!doctype html><html lang="ko"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Admin</title><link rel="stylesheet" href="style-v4.css?v=4"></head><body class="">
<script src="data-v4.js?v=4"></script><script src="app-v4.js?v=4"></script>
<main class="loginbox"><div class="kicker">APDC MINI ADMIN</div>
<div id="loginBox"><h1>Admin Login</h1><p class="meta">관리자 비밀번호를 입력하세요.</p><div class="loginrow"><input id="pw" class="input" type="password" inputmode="numeric" placeholder="Password"><button id="loginBtn" class="btn dark">LOGIN</button></div><div id="msg" class="notice"></div></div>
<div id="adminMenu" class="hidden"><h1>Admin Menu</h1><p class="meta">운영 및 심사 기능을 선택하세요.</p>
<div class="menu"><a href="dashboard.html"><strong>DASHBOARD</strong><small>EVENT GROUP START · FINISH · NEXT</small></a><a href="judge.html"><strong>JUDGE</strong><small>김태원 · 망나뇽 · 문나나 심사</small></a><a href="mc.html"><strong>MC</strong><small>현재 및 다음 경기 안내</small></a><a href="live.html"><strong>LIVE</strong><small>현장 진행 화면</small></a><a href="broadcast.html"><strong>BROADCAST</strong><small>대형 화면 송출</small></a><a href="results.html"><strong>RESULTS</strong><small>EVENT별 심사 결과 확인 및 확정</small></a><a href="settings.html"><strong>SETTINGS</strong><small>EVENT 심사 초기화</small></a><a href="index.html"><strong>ENTRY</strong><small>엔트리 검색</small></a></div>
<div style="margin-top:16px"><button id="logoutBtn" class="btn">LOGOUT</button></div></div></main>
<script>
function show(){q('loginBox').classList.add('hidden');q('adminMenu').classList.remove('hidden')}
if(isAdmin())show();
q('loginBtn').onclick=()=>{if(adminLogin(q('pw').value)){show()}else{q('msg').textContent='비밀번호가 올바르지 않습니다.'}};
q('pw').addEventListener('keydown',e=>{if(e.key==='Enter')q('loginBtn').click()});
q('logoutBtn').onclick=adminLogout;
</script></body></html>
