<!doctype html><html lang="ko"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC LIVE</title><link rel="stylesheet" href="style-v4.css?v=4"></head><body class="fullscreen">
<script src="data-v4.js?v=4"></script><script src="app-v4.js?v=4"></script><script>requireAdmin();</script>
<main class="screen"><div class="screenhead"><b>APDC LIVE</b><span id="clock"></span></div><section class="screenmain"><div id="gno" class="screenlabel"></div><div id="title" class="screentitle"></div><div id="subt" class="screensub"></div><div id="status" class="badge"></div><div id="events" class="screen-events"></div><div id="people" class="screenpeople"></div></section><div id="nextinfo" class="screennext"></div></main>
<script>
let G=allGroups();function render(){let S=getState(),i=Math.min(S.groupIndex,G.length-1),g=G[i],n=G[i+1],u=uniqueEntries(g);q('gno').textContent='GROUP '+String(g.groupNo).padStart(2,'0');q('title').textContent=g.title;q('subt').textContent=g.events.length+' SEPARATE EVENTS · '+u.length+' FLOOR ENTRIES';q('status').textContent=statusText(S.status);q('events').innerHTML=g.events.map(e=>`<span>EVENT ${String(e.no).padStart(2,'0')} · ${e.title}</span>`).join('');q('people').innerHTML=u.map(p=>`<div class="screenperson">${p.backNo} · ${p.name}</div>`).join('');q('nextinfo').innerHTML=n?'NEXT · <b>GROUP '+String(n.groupNo).padStart(2,'0')+' · '+n.title+'</b>':'NEXT · <b>END OF PROGRAM</b>';q('clock').textContent=new Date().toLocaleTimeString('ko-KR')}render();setInterval(render,1000);
</script></body></html>
