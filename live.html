<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC LIVE</title><link rel="stylesheet" href="style.css?v=3"></head><body class="fullscreen"><main class="screen"><div class="screenhead"><b>APDC LIVE</b><span id="clock"></span></div><section class="screenmain"><div class="screenlabel" id="eno"></div><div class="screentitle" id="title"></div><div class="screensub" id="subt"></div><div class="badge" id="status"></div><div class="screenpeople" id="people"></div></section><div class="screennext" id="nextinfo"></div></main><script src="shared.js"></script><script>
document.getElementById('nav')?.remove();let E=[],S=loadState();fetch('events.json').then(r=>r.json()).then(x=>{E=x;render()});function render(){if(!E.length)return;let e=E[S.index];eno.textContent='EVENT '+String(e.no).padStart(2,'0');title.textContent=e.title;subt.textContent=e.subtitle||e.section;status.textContent=statusText(S.status);people.innerHTML=e.entries.map(p=>`<div class="screenperson">${p.backNo} · ${p.name}</div>`).join('');let n=E[S.index+1];nextinfo.innerHTML=n?'NEXT · <b>'+String(n.no).padStart(2,'0')+'. '+n.title+(n.subtitle?' · '+n.subtitle:'')+'</b>':'NEXT · <b>END OF PROGRAM</b>'}subscribeState(x=>{S=x;render()});setInterval(()=>clock.textContent=new Date().toLocaleTimeString('ko-KR'),1000);
</script></body></html>
