<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC BROADCAST</title><link rel="stylesheet" href="style.css?v=5"></head><body class="fullscreen"><main class="screen"><div class="screenhead"><b>APDC BROADCAST</b><span id="clock"></span></div><section class="screenmain"><div class="screenlabel" id="hno"></div><div class="screentitle" id="title"></div><div class="screensub" id="subt"></div><div class="badge" id="status"></div><div class="screen-events" id="events"></div><div class="screenpeople" id="people"></div></section><div class="screennext" id="nextinfo"></div></main><script src="shared.js"></script><script>if(sessionStorage.getItem("apdc_mini_admin_ok")!=="1"){location.replace("admin.html");}
let H=[],S=loadState();fetch('running_groups.json').then(r=>r.json()).then(x=>{H=x;render()});function render(){if(!H.length)return;let h=H[S.groupIndex||0],u=uniqueEventEntries(h);hno.textContent='EVENT '+String(h.groupNo).padStart(2,'0');title.textContent=h.dance;subt.textContent=h.events.length+' SEPARATE EVENTS · '+h.entryCount+' FLOOR ENTRIES';status.textContent=statusText(S.status);events.innerHTML=h.events.map(e=>`<span>EVENT ${String(e.no).padStart(2,'0')} · ${e.title}</span>`).join('');people.innerHTML=u.map(p=>`<div class="screenperson">${p.backNo} · ${p.name}</div>`).join('');let n=H[(S.groupIndex||0)+1];nextinfo.innerHTML=n?'NEXT · <b>EVENT '+String(n.groupNo).padStart(2,'0')+' · '+n.dance+'</b>':'NEXT · <b>END OF PROGRAM</b>'}subscribeState(x=>{S=x;render()});setInterval(()=>clock.textContent=new Date().toLocaleTimeString('ko-KR'),1000);
</script></body></html>
