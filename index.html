<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Entry Search</title><link rel="stylesheet" href="style.css?v=4"></head><body><header class="top"><a class="brand" href="index.html">APDC MINI</a><nav class="nav"><a href="admin.html">ADMIN</a></nav></header><main class="wrap"><section class="hero"><h1>Entry Search</h1><p>이름, 백넘버 또는 종목으로 검색하세요.</p></section><div class="searchbar"><input id="q" class="input" placeholder="이름 / 백넘버 / 종목"><button id="clear" class="btn">초기화</button></div><div id="results"></div></main><script>
let E=[];
fetch('events.json').then(r=>r.json()).then(x=>{E=x;render()});q.oninput=render;clear.onclick=()=>{q.value='';render()};
function render(){let s=q.value.trim().toLowerCase();let html='';E.forEach(e=>{let entries=e.entries.filter(p=>!s||p.name.toLowerCase().includes(s)||String(p.backNo).includes(s)||e.title.toLowerCase().includes(s)||e.section.toLowerCase().includes(s)||e.subtitle.toLowerCase().includes(s));if(entries.length){html+=`<section class="event-card"><div class="event-title">${String(e.no).padStart(2,'0')}. ${e.title}${e.subtitle?' · '+e.subtitle:''}</div><div class="meta">${e.section} · ${entries.length} entries</div><table class="entry-table"><thead><tr><th>BACK NO.</th><th>COMPETITOR / TEAM</th><th>TYPE</th></tr></thead><tbody>${entries.map(p=>`<tr><td>${p.backNo}</td><td><b>${p.name}</b></td><td>${p.type}</td></tr>`).join('')}</tbody></table></section>`}});results.innerHTML=html||'<div class="panel">검색 결과가 없습니다.</div>'}
</script></body></html>
