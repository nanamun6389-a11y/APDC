<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC MINI</title><link rel="stylesheet" href="style.css"></head><body class="">
<script src="data.js"></script><script src="app.js"></script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Entry Search</h1><p>이름 또는 백넘버로 검색하세요.</p></section>
<div class="searchbar"><input id="searchInput" class="input" placeholder="이름 / 백넘버"><button id="searchBtn" class="btn dark">검색</button></div><div id="results"></div></main>
<script>
q('nav').innerHTML=nav('entry');
function render(){
 const s=q('searchInput').value.trim().toLowerCase();
 const rows=[];
 APDC_EVENTS.forEach(e=>e.entries.forEach(p=>{if(!s||p.name.toLowerCase().includes(s)||String(p.backNo).includes(s)) rows.push({e,p})}));
 q('results').innerHTML=rows.length?rows.map(({e,p})=>`<section class="card"><div class="kicker">EVENT ${String(e.no).padStart(2,'0')}</div><h2>${p.backNo} · ${p.name}</h2><div class="meta">${e.title} · ${e.section} · ${e.round}</div></section>`).join(''):'<section class="panel">검색 결과가 없습니다.</section>';
}
q('searchBtn').onclick=render;q('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')render()});render();
</script></body></html>
