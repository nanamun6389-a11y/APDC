<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC MINI</title><link rel="stylesheet" href="style.css"></head><body class="">
<script src="data.js"></script><script src="app.js"></script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Entry Search</h1><p>이름 또는 백넘버로 검색하세요.</p></section>
<div class="searchbar"><input id="searchInput" class="input" placeholder="이름 / 백넘버"><button id="searchBtn" class="btn dark">검색</button></div><div id="results"></div></main>
<script>
q('nav').innerHTML=nav('entry');
function allPlayers(){
  const map=new Map();
  APDC_EVENTS.forEach(e=>e.entries.forEach(p=>{
    const key=String(p.backNo)+'|'+p.name;
    if(!map.has(key)) map.set(key,{backNo:p.backNo,name:p.name,events:[]});
    map.get(key).events.push(e);
  }));
  return [...map.values()];
}
function render(){
  const s=q('searchInput').value.trim().toLowerCase();
  const players=allPlayers().filter(p=>{
    if(!s)return true;
    return p.name.toLowerCase().includes(s) ||
      String(p.backNo).includes(s) ||
      p.events.some(e=>e.title.toLowerCase().includes(s)||e.section.toLowerCase().includes(s));
  });
  q('results').innerHTML=players.length?players.map(p=>`
    <section class="card">
      <div class="kicker">BACK NO. ${p.backNo}</div>
      <h2>${p.name}</h2>
      <div class="group-events">
        ${p.events.sort((a,b)=>a.no-b.no).map(e=>`
          <div class="group-event-row">
            <b>EVENT ${String(e.no).padStart(2,'0')}</b>
            <span>${e.title}</span>
            <em>${e.section}</em>
          </div>`).join('')}
      </div>
    </section>`).join(''):'<section class="panel">검색 결과가 없습니다.</section>';
}
q('searchBtn').onclick=render;
q('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')render()});
render();
</script></body></html>
