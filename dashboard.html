<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Dashboard</title><link rel="stylesheet" href="style.css?v=5"></head><body><div id="nav"></div><main class="wrap"><section class="hero"><h1>Heat Dashboard</h1><p>같은 플로어에서 진행할 경기를 HEAT로 묶고, 각 EVENT의 심사와 결과는 별도로 관리합니다.</p></section><div class="grid2"><section class="panel"><div class="statusbox"><div class="kicker" id="hno"></div><div class="bigtitle" id="title"></div><div class="meta" id="meta"></div><div class="badge" id="badge"></div><div id="events" class="heat-events"></div><div class="people" id="people"></div></div><div class="controls"><button id="prev" class="btn">이전</button><button id="start" class="btn dark">START</button><button id="finish" class="btn">FINISH</button><button id="next" class="btn">NEXT</button></div><button id="reset" class="btn" style="width:100%;margin-top:8px">전체 초기화</button></section><section class="panel"><h2>Heat List</h2><div id="list"></div></section></div></main><script src="shared.js"></script><script>requireAdmin();</script><script>
document.getElementById('nav').innerHTML=nav('dashboard');let H=[],S=loadState();fetch('heats.json').then(r=>r.json()).then(x=>{H=x;render()});
function render(){if(!H.length)return;S.heatIndex=Math.max(0,Math.min(S.heatIndex||0,H.length-1));let h=H[S.heatIndex],u=uniqueHeatEntries(h);hno.textContent='HEAT '+String(h.heatNo).padStart(2,'0');title.textContent=h.dance+' · '+h.entryCount+' ON FLOOR';meta.textContent=h.events.length+' separate events';badge.textContent=statusText(S.status);events.innerHTML=h.events.map(e=>`<div class="heat-event-row"><b>EVENT ${String(e.no).padStart(2,'0')}</b><span>${e.title}</span><em>${e.entries.length} entries</em></div>`).join('');people.innerHTML=u.map(p=>`<div class="person">${p.backNo} · ${p.name}</div>`).join('');prev.disabled=S.heatIndex===0;next.disabled=S.heatIndex===H.length-1;start.disabled=S.status==='LIVE';finish.disabled=S.status!=='LIVE';list.innerHTML=H.map((x,i)=>`<div class="listitem ${i===S.heatIndex?'active':''}" data-i="${i}"><b>HEAT ${String(x.heatNo).padStart(2,'0')} · ${x.dance}</b><div class="meta">${x.events.length} events · ${x.entryCount} floor entries ${i===S.heatIndex?'· '+statusText(S.status):''}</div></div>`).join('');document.querySelectorAll('.listitem').forEach(el=>el.onclick=()=>{S={heatIndex:+el.dataset.i,status:'READY'};saveState(S);render()})}
start.onclick=()=>{S.status='LIVE';saveState(S);render()};finish.onclick=()=>{S.status='FINISHED';saveState(S);render()};prev.onclick=()=>{if(S.heatIndex){S.heatIndex--;S.status='READY';saveState(S);render()}};next.onclick=()=>{if(S.heatIndex<H.length-1){S.heatIndex++;S.status='READY';saveState(S);render()}};reset.onclick=()=>{S=defaultState();saveState(S);render()};subscribeState(x=>{S=x;render()});
</script></body></html>
