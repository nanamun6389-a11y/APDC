<!doctype html><html lang="ko"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Dashboard</title><link rel="stylesheet" href="style-v4.css?v=4"></head><body class="">
<script src="data-v4.js?v=4"></script><script src="app-v4.js?v=4"></script><script>requireAdmin();</script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Event Dashboard</h1><p>같이 진행하는 경기는 GROUP으로 묶고, 심사와 결과는 각 EVENT별로 관리합니다.</p></section>
<div class="grid2"><section class="panel"><div class="kicker" id="gno"></div><div class="bigtitle" id="gtitle"></div><div class="badge" id="status"></div><div id="events" class="group-events"></div><div id="people" class="people"></div>
<div class="controls"><button id="prev" class="btn">이전</button><button id="start" class="btn dark">START</button><button id="finish" class="btn">FINISH</button><button id="next" class="btn">NEXT</button></div></section><section class="panel"><h2>GROUP LIST</h2><div id="list"></div></section></div></main>
<script>
q('nav').innerHTML=nav('dashboard');let S=getState(),G=allGroups();
function render(){S.groupIndex=Math.max(0,Math.min(S.groupIndex,G.length-1));let g=G[S.groupIndex],u=uniqueEntries(g);q('gno').textContent='GROUP '+String(g.groupNo).padStart(2,'0');q('gtitle').textContent=g.title;q('status').textContent=statusText(S.status);q('events').innerHTML=g.events.map(e=>`<div class="group-event-row"><b>EVENT ${String(e.no).padStart(2,'0')}</b><span>${e.title}</span><em>${e.entries.length} entries</em></div>`).join('');q('people').innerHTML=u.map(p=>`<div class="person">${p.backNo} · ${p.name}</div>`).join('');q('list').innerHTML=G.map((x,i)=>`<div class="listitem ${i===S.groupIndex?'active':''}" data-i="${i}"><b>GROUP ${String(x.groupNo).padStart(2,'0')} · ${x.title}</b><div class="meta">${x.events.length} separate EVENT</div></div>`).join('');document.querySelectorAll('.listitem').forEach(x=>x.onclick=()=>{S={groupIndex:+x.dataset.i,status:'READY'};setState(S);render()})}
q('start').onclick=()=>{S.status='LIVE';setState(S);render()};q('finish').onclick=()=>{S.status='FINISHED';setState(S);render()};q('prev').onclick=()=>{if(S.groupIndex>0){S.groupIndex--;S.status='READY';setState(S);render()}};q('next').onclick=()=>{if(S.groupIndex<G.length-1){S.groupIndex++;S.status='READY';setState(S);render()}};render();
</script></body></html>
