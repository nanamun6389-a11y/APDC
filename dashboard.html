<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Dashboard</title><link rel="stylesheet" href="style.css?v=3"></head><body><div id="nav"></div><main class="wrap"><section class="hero"><h1>Event Dashboard</h1><p>경기 시작과 종료를 체크하면 MC·LIVE·BROADCAST 화면이 함께 변경됩니다.</p></section><div class="grid2"><section class="panel"><div class="statusbox"><div class="kicker" id="eno"></div><div class="bigtitle" id="title"></div><div class="meta" id="meta"></div><div class="badge" id="badge"></div><div class="people" id="people"></div></div><div class="controls"><button id="prev" class="btn">이전</button><button id="start" class="btn dark">START</button><button id="finish" class="btn">FINISH</button><button id="next" class="btn">NEXT</button></div><button id="reset" class="btn" style="width:100%;margin-top:8px">전체 초기화</button></section><section class="panel"><h2>Event List</h2><div id="list"></div></section></div></main><script src="shared.js"></script><script>
document.getElementById('nav').innerHTML=nav('dashboard');let E=[],S=loadState();fetch('events.json').then(r=>r.json()).then(x=>{E=x;render()});
function render(){if(!E.length)return;let e=E[S.index];eno.textContent='EVENT '+String(e.no).padStart(2,'0');title.textContent=e.title+(e.subtitle?' · '+e.subtitle:'');meta.textContent=e.section+' · '+e.round;badge.textContent=statusText(S.status);people.innerHTML=e.entries.map(p=>`<div class="person">${p.backNo} · ${p.name}</div>`).join('');prev.disabled=S.index===0;next.disabled=S.index===E.length-1;start.disabled=S.status==='LIVE';finish.disabled=S.status!=='LIVE';list.innerHTML=E.map((x,i)=>`<div class="listitem ${i===S.index?'active':''}" data-i="${i}"><b>${String(x.no).padStart(2,'0')}. ${x.title}${x.subtitle?' · '+x.subtitle:''}</b><div class="meta">${x.entries.length} entries ${i===S.index?'· '+statusText(S.status):''}</div></div>`).join('');document.querySelectorAll('.listitem').forEach(el=>el.onclick=()=>{S={index:+el.dataset.i,status:'READY'};saveState(S);render()})}
start.onclick=()=>{S.status='LIVE';saveState(S);render()};finish.onclick=()=>{S.status='FINISHED';saveState(S);render()};prev.onclick=()=>{if(S.index){S.index--;S.status='READY';saveState(S);render()}};next.onclick=()=>{if(S.index<E.length-1){S.index++;S.status='READY';saveState(S);render()}};reset.onclick=()=>{S=defaultState();saveState(S);render()};subscribeState(x=>{S=x;render()});
</script></body></html>
