<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC MC</title><link rel="stylesheet" href="style.css"></head><body class="">
<script src="data.js"></script><script src="app.js"></script><script>requireAdmin();</script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>MC Screen</h1><p>현재 GROUP과 다음 GROUP을 안내합니다.</p></section><section class="panel"><div class="kicker" id="gno"></div><div class="bigtitle" id="title"></div><div class="badge" id="status"></div><div id="events" class="group-events"></div><hr><div id="scriptText" class="mcbox"></div><div class="card"><b>NEXT</b><div id="nextinfo" class="meta"></div></div></section></main>
<script>
q('nav').innerHTML=nav('mc');let G=allGroups();function render(){let S=getState(),i=Math.min(S.groupIndex,G.length-1),g=G[i],n=G[i+1];q('gno').textContent='GROUP '+String(g.groupNo).padStart(2,'0');q('title').textContent=g.title+' · '+uniqueEntries(g).length+' ON FLOOR';q('status').textContent=statusText(S.status);q('events').innerHTML=g.events.map(e=>`<div class="group-event-row"><b>EVENT ${String(e.no).padStart(2,'0')}</b><span>${e.title}</span><em>${e.entries.length} entries</em></div>`).join('');q('scriptText').textContent=S.status==='LIVE'?'GROUP '+g.groupNo+' 참가 선수 여러분, 플로어로 입장해 주시기 바랍니다. 표시된 각 EVENT는 별도로 심사합니다. 경기를 시작하겠습니다.':S.status==='FINISHED'?'GROUP '+g.groupNo+' 경기가 종료되었습니다. 선수 여러분께 큰 박수 부탁드립니다.':'다음 경기는 GROUP '+g.groupNo+' · '+g.title+'입니다. 참가 선수 여러분께서는 준비해 주시기 바랍니다.';q('nextinfo').textContent=n?'GROUP '+String(n.groupNo).padStart(2,'0')+' · '+n.title:'END OF PROGRAM'}render();setInterval(render,1000);
</script></body></html>
