<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC MC</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main class="wrap"><section class="hero"><h1>MC Screen</h1><p>현재 경기 상태에 맞는 안내 문구가 자동으로 표시됩니다.</p></section><section class="panel"><div class="kicker" id="eno"></div><div class="bigtitle" id="title"></div><div class="badge" id="badge"></div><hr style="margin:24px 0;border:0;border-top:1px solid #ddd"><div class="mcbox" id="script"></div><div class="event-card" style="margin-top:22px"><b>NEXT EVENT</b><div class="meta" id="nextinfo"></div></div></section></main><script src="shared.js"></script><script>
document.getElementById('nav').innerHTML=nav('mc');let E=[],S=loadState();fetch('events.json').then(r=>r.json()).then(x=>{E=x;render()});function render(){if(!E.length)return;let e=E[S.index];eno.textContent='EVENT '+String(e.no).padStart(2,'0');title.textContent=e.title+(e.subtitle?' · '+e.subtitle:'');badge.textContent=statusText(S.status);script.textContent=S.status==='LIVE'?'선수 여러분, 플로어로 입장해 주시기 바랍니다. 경기를 시작하겠습니다.':S.status==='FINISHED'?'경기가 종료되었습니다. 선수 여러분께 큰 박수 부탁드립니다.':'다음 경기는 '+e.title+(e.subtitle?' '+e.subtitle:'')+'입니다. 참가 선수 여러분께서는 준비해 주시기 바랍니다.';let n=E[S.index+1];nextinfo.textContent=n?String(n.no).padStart(2,'0')+'. '+n.title+(n.subtitle?' · '+n.subtitle:''):'END OF PROGRAM'}subscribeState(x=>{S=x;render()});
</script></body></html>
