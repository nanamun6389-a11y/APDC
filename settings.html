<!doctype html><html lang="ko"><head><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Settings</title><link rel="stylesheet" href="style-v4.css?v=4"></head><body class="">
<script src="data-v4.js?v=4"></script><script src="app-v4.js?v=4"></script><script>requireAdmin();</script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Settings</h1><p>심사 초기화는 관리자 안에서만 가능합니다.</p></section><section class="panel"><label><b>초기화할 EVENT</b></label><select id="eventSelect" class="select"></select><div class="settings-actions"><button id="resetEvent" class="btn">선택 EVENT 심사 초기화</button><button id="resetAll" class="btn danger">ALL EVENT 심사 전체 초기화</button></div><div id="msg" class="notice"></div></section></main>
<script>
q('nav').innerHTML=nav('settings');q('eventSelect').innerHTML=APDC_EVENTS.map(e=>`<option value="${e.no}">EVENT ${String(e.no).padStart(2,'0')} · ${e.title}</option>`).join('');
q('resetEvent').onclick=()=>{let no=q('eventSelect').value;if(!confirm('EVENT '+no+' 심사를 초기화할까요?'))return;let s=getScores();Object.keys(s).filter(k=>k.endsWith('|'+no)).forEach(k=>delete s[k]);saveScores(s);q('msg').textContent='EVENT '+no+' 심사가 초기화되었습니다.'};
q('resetAll').onclick=()=>{if(!confirm('모든 EVENT 심사를 전부 초기화할까요?'))return;localStorage.removeItem(SCORE_KEY);localStorage.removeItem(RESULT_KEY);q('msg').textContent='모든 심사와 결과가 초기화되었습니다.'};
</script></body></html>
