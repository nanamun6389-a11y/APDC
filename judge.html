<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Judge</title><link rel="stylesheet" href="style.css?v=5"></head><body><div id="nav"></div><main class="wrap"><section class="hero"><h1>Judge</h1><p>현재 HEAT 안의 EVENT를 각각 선택해 별도로 심사합니다. 제출 완료 여부가 EVENT 탭에 표시됩니다.</p></section><section class="panel"><div class="judges"><button class="judgebtn active" data-j="김태원">김태원</button><button class="judgebtn" data-j="최지혜">최지혜</button></div><div class="judge-toolbar"><select id="heatSelect" class="select"></select><div id="heatStatus" class="badge"></div></div><div id="eventTabs" class="event-tabs"></div><div class="statusbox" style="margin-top:14px"><div class="kicker" id="eno"></div><div class="bigtitle" id="title"></div><div class="meta" id="meta"></div></div><table class="entry-table"><thead><tr><th>BACK NO.</th><th>COMPETITOR / TEAM</th><th>RANK</th></tr></thead><tbody id="body"></tbody></table><button id="save" class="btn dark" style="width:100%;margin-top:16px">이 EVENT 심사 저장</button><div id="msg" class="notice"></div></section></main><script src="shared.js"></script><script>requireAdmin();</script><script>
document.getElementById('nav').innerHTML=nav('judge');let H=[],J='김태원',HI=0,EI=0,S=loadState();
fetch('heats.json').then(r=>r.json()).then(x=>{H=x;HI=Math.max(0,Math.min(S.heatIndex||0,H.length-1));heatSelect.innerHTML=H.map((h,i)=>`<option value="${i}">HEAT ${String(h.heatNo).padStart(2,'0')} · ${h.dance} · ${h.events.length} EVENTS</option>`).join('');heatSelect.value=HI;render()});
document.querySelectorAll('.judgebtn').forEach(b=>b.onclick=()=>{J=b.dataset.j;document.querySelectorAll('.judgebtn').forEach(x=>x.classList.toggle('active',x===b));render()});heatSelect.onchange=()=>{HI=+heatSelect.value;EI=0;render()};
function submitted(e){let s=loadJSON(SCORE_KEY)[eventKey(J,e.no)]||{};return e.entries.length>0&&e.entries.every(p=>s[p.backNo])}
function render(){if(!H.length)return;let h=H[HI];EI=Math.min(EI,h.events.length-1);let all=loadJSON(SCORE_KEY);heatStatus.textContent=`${h.events.filter(submitted).length}/${h.events.length} SUBMITTED`;eventTabs.innerHTML=h.events.map((e,i)=>`<button class="event-tab ${i===EI?'active':''} ${submitted(e)?'done':''}" data-i="${i}"><span>EVENT ${String(e.no).padStart(2,'0')}</span><small>${submitted(e)?'✓ 제출완료':'○ 미제출'}</small></button>`).join('');document.querySelectorAll('.event-tab').forEach(b=>b.onclick=()=>{EI=+b.dataset.i;render()});let e=h.events[EI],saved=all[eventKey(J,e.no)]||{};eno.textContent=`HEAT ${String(h.heatNo).padStart(2,'0')} · EVENT ${String(e.no).padStart(2,'0')}`;title.textContent=e.title+(e.subtitle?' · '+e.subtitle:'');meta.textContent=e.section+' · '+e.round+' · '+e.entries.length+' entries';body.innerHTML=e.entries.map(p=>`<tr><td>${p.backNo}</td><td><b>${p.name}</b></td><td><input class="rank" type="number" min="1" max="${e.entries.length}" data-back="${p.backNo}" value="${saved[p.backNo]||''}"></td></tr>`).join('');msg.textContent=''}
save.onclick=()=>{let h=H[HI],e=h.events[EI],all=loadJSON(SCORE_KEY),v={};document.querySelectorAll('.rank').forEach(x=>{if(x.value)v[x.dataset.back]=+x.value});all[eventKey(J,e.no)]=v;saveJSON(SCORE_KEY,all);msg.textContent=J+' 심사위원의 EVENT '+String(e.no).padStart(2,'0')+' 심사가 저장되었습니다.';render();let next=h.events.findIndex((x,i)=>i>EI&&!submitted(x));if(next>=0){EI=next;render()}};
subscribeState(x=>{S=x;if(H.length&&x.status==='LIVE'&&HI!==(x.heatIndex||0)){HI=x.heatIndex||0;EI=0;heatSelect.value=HI;render()}});
</script></body></html>
