<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Judge</title><link rel="stylesheet" href="style.css?v=7-judge-tap-rank"></head><body>
<div id="combinedEventJudgeNotice" class="combined-group-notice hidden"> <strong>합쳐진 경기 안내</strong> <span>한 EVENT에 여러 EVENT가 있으면 모든 EVENT를 각각 심사해 주세요.</span> <small>If one EVENT has multiple EVENTS, please judge every EVENT separately.</small>
</div>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Judge</h1><p>현재 EVENT 안의 EVENT를 각각 선택해 별도로 심사합니다. 제출 완료 여부가 EVENT 탭에 표시됩니다.</p></section><section class="panel"><div class="judges"></div><div class="judge-toolbar">
<div id="judgeButtons" class="judge-buttons">
  <button type="button" class="judge-person active" data-judge="Kim Tae Won">김태원</button>
  <button type="button" class="judge-person" data-judge="Mangnanyong">망나뇽</button>
  <button type="button" class="judge-person" data-judge="Moon Nana">문나나</button>
</div>
<div id="selectedJudgeLabel" class="selected-judge-label">선택된 심사위원: 김태원</div>
<input type="hidden" id="judgeSelect" value="Kim Tae Won">

<select id="groupSelect" class="select"></select><div id="groupStatus" class="badge"></div></div><div id="eventTabs" class="event-tabs"></div><div class="statusbox" style="margin-top:14px"><div class="kicker" id="eno"></div><div class="bigtitle" id="title"></div><div class="meta" id="meta"></div></div><table class="entry-table"><thead><tr><th>BACK NO.</th><th>COMPETITOR / TEAM</th><th>선택 순위</th></tr></thead><tbody id="body"></tbody></table><div style="display:grid;gap:10px;margin-top:16px">

<button id="save" class="btn dark" style="width:100%">이 EVENT 심사 저장</button>
</div><div id="msg" class="notice"></div></section></main><script src="shared.js"></script><script>if(sessionStorage.getItem('apdc_mini_admin_ok')!=='1'){location.replace('admin.html');}</script><script>
document.getElementById('nav').innerHTML=nav('judge');const groupSelect=document.getElementById('groupSelect');
const groupStatus=document.getElementById('groupStatus');
const eventTabs=document.getElementById('eventTabs');
const eno=document.getElementById('eno');
const titleEl=document.getElementById('title');
const meta=document.getElementById('meta');
const body=document.getElementById('body');
const saveBtn=document.getElementById('save');
const msg=document.getElementById('msg');
let H=[],J='Kim Tae Won',HI=0,EI=0,S=loadState();
fetch('running_groups.json').then(r=>r.json()).then(x=>{H=x;HI=Math.max(0,Math.min(S.groupIndex||0,H.length-1));groupSelect.innerHTML=H.map((h,i)=>`<option value="${i}">EVENT ${String(h.groupNo).padStart(2,'0')} · ${h.title || ""} · ${h.events.length} EVENTS</option>`).join('');groupSelect.value=HI;render()});
document.querySelectorAll('.judgebtn').forEach(b=>b.onclick=()=>{J=b.dataset.j;document.querySelectorAll('.judgebtn').forEach(x=>x.classList.toggle('active',x===b));render()});groupSelect.onchange=()=>{HI=+groupSelect.value;EI=0;render()};
let ORDER=[];
function submitted(e){let s=loadJSON(SCORE_KEY)[eventKey(J,e.no)]||{};return e.entries.length>0&&e.entries.every(p=>s[p.backNo])}
function currentEvent(){return H[HI].events[EI]}
function loadOrder(e,saved){ORDER=Object.entries(saved).sort((a,b)=>a[1]-b[1]).map(([back])=>String(back)).filter(back=>e.entries.some(p=>String(p.backNo)===back))}
function drawEntries(e){ body.innerHTML=e.entries.map(p=>{ let pos=ORDER.indexOf(String(p.backNo)); let rank=pos>=0?pos+1:''; return `<tr class="rank-row ${rank?'selected':''}" data-back="${p.backNo}" role="button" tabindex="0"> <td>${p.backNo}</td> <td><b>${p.name}</b></td> <td><span class="rank-pick ${rank?'selected':''}">${rank?rank+'위':'누르기'}</span></td> </tr>`; }).join(''); document.querySelectorAll('.rank-row').forEach(row=>{ row.onclick=()=>toggleRank(String(row.dataset.back)); row.onkeydown=(ev)=>{ if(ev.key==='Enter'||ev.key===' '){ ev.preventDefault(); toggleRank(String(row.dataset.back)); } }; });
}
function toggleRank(back){let i=ORDER.indexOf(back);if(i>=0)ORDER.splice(i,1);else ORDER.push(back);drawEntries(currentEvent());msg.textContent=ORDER.length?`현재 ${ORDER.length}명 선택 · 다시 누르면 취소됩니다.`:'선수를 1위부터 순서대로 눌러 주세요.'}
function render(){if(!H.length)return;let h=H[HI];EI=Math.min(EI,h.events.length-1);let all=loadJSON(SCORE_KEY);groupStatus.textContent=`${h.events.filter(submitted).length}/${h.events.length} SUBMITTED`;eventTabs.innerHTML=h.events.map((e,i)=>`<button class="event-tab ${i===EI?'active':''} ${submitted(e)?'done':''}" data-i="${i}"><span>EVENT ${String(e.no).padStart(2,'0')}</span><small>${submitted(e)?'✓ 제출완료':'○ 미제출'}</small></button>`).join('');document.querySelectorAll('.event-tab').forEach(b=>b.onclick=()=>{EI=+b.dataset.i;render()});let e=h.events[EI],saved=all[eventKey(J,e.no)]||{};loadOrder(e,saved);eno.textContent=`EVENT ${String(e.no).padStart(2,'0')}`;titleEl.textContent=e.title+(e.subtitle?' · '+e.subtitle:'');meta.textContent=e.section+' · '+e.round+' · '+e.entries.length+' entries';drawEntries(e);msg.textContent=ORDER.length?`저장된 순위 ${ORDER.length}명 · 선수를 다시 누르면 취소됩니다.`:'선수를 1위부터 순서대로 눌러 주세요.'}
saveBtn.onclick=()=>{try{
  let h=H[HI],e=h.events[EI];
  if(ORDER.length!==e.entries.length){
    msg.textContent=`모든 선수를 순서대로 선택해 주세요. (${ORDER.length}/${e.entries.length})`;
    return;
  }
  let all=loadJSON(SCORE_KEY)||{},v={};
  ORDER.forEach((back,i)=>v[String(back)]=i+1);

  // Existing app key
  const primaryKey=eventKey(J,e.no);
  all[primaryKey]=v;

  // Stable mirror key used by RESULTS regardless of shared.js key format
  all['APDC_STABLE|'+J+'|'+String(e.no)]=v;

  // Also save Korean-name aliases for compatibility
  const aliases={
    'Kim Tae Won':['김태원'],
    'Mangnanyong':['망나뇽'],
    'Moon Nana':['문나나']
  };
  (aliases[J]||[]).forEach(name=>{
    all['APDC_STABLE|'+name+'|'+String(e.no)]=v;
  });

  saveJSON(SCORE_KEY,all);

  const verify=loadJSON(SCORE_KEY)||{};
  if(!verify[primaryKey] && !verify['APDC_STABLE|'+J+'|'+String(e.no)]){
    msg.textContent='저장 확인에 실패했습니다. 다시 눌러 주세요.';
    return;
  }
  msg.textContent=J+' 심사위원의 EVENT '+String(e.no).padStart(2,'0')+' 심사가 저장되었습니다. ✓';
  render();

  let next=h.events.findIndex((x,i)=>i>EI&&!submitted(x));
  if(next>=0){EI=next;render();}
}catch(err){
  console.error(err);
  msg.textContent='심사 저장 중 오류가 발생했습니다: '+(err?.message||err);
}};
subscribeState(x=>{S=x;if(H.length&&x.status==='LIVE'&&HI!==(x.groupIndex||0)){HI=x.groupIndex||0;EI=0;groupSelect.value=HI;render()}});
</script>
<script>
(function(){ function updateCombinedNotice(){ const notice=document.getElementById('combinedEventJudgeNotice'); if(!notice) return; let count=0; try{ if(window.CURRENT_EVENT && Array.isArray(window.CURRENT_EVENT.events)) count=window.CURRENT_EVENT.events.length; }catch(e){} if(!count){ const tabs=document.querySelectorAll('[data-event], .event-tab, .event-btn, .group-event-button'); count=tabs.length; } notice.classList.toggle('hidden', count<=1); } document.addEventListener('DOMContentLoaded', updateCombinedNotice); setInterval(updateCombinedNotice, 800);
})();
</script>
<script>
(function(){
  const hidden=document.getElementById('judgeSelect');
  const btns=[...document.querySelectorAll('.judge-person')];
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if(hidden) hidden.value=btn.dataset.judge;
      try{
        if(typeof J!=='') J=btn.dataset.judge;
        if(typeof render==='function') render();
      }catch(e){}
    });
  });
})();
</script>

<script>
(function(){
  function setupJudgeButtons(){
    const hidden=document.getElementById('judgeSelect');
    const label=document.getElementById('selectedJudgeLabel');
    const btns=[...document.querySelectorAll('.judge-person')];
    if(!btns.length) return;
    btns.forEach(btn=>{
      btn.onclick=()=>{
        btns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        const val=btn.dataset.judge;
        if(hidden) hidden.value=val;
        if(label) label.textContent='선택된 심사위원: '+btn.textContent.trim();
        try{
          if(typeof J!=='undefined') J=val;
          if(typeof render==='function') render();
        }catch(e){}
      };
    });
  }
  document.addEventListener('DOMContentLoaded',setupJudgeButtons);
})();
</script>

</body></html>
