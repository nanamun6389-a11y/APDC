<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Judge</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main class="wrap"><section class="hero"><h1>Judge</h1><p>심사위원을 선택하고 각 선수의 순위를 입력하세요.</p></section><section class="panel"><div class="judges"><button class="judgebtn active" data-j="김태원">김태원</button><button class="judgebtn" data-j="최지혜">최지혜</button></div><select id="eventSelect" class="select"></select><div class="statusbox" style="margin-top:14px"><div class="kicker" id="eno"></div><div class="bigtitle" id="title"></div><div class="meta" id="meta"></div></div><table class="entry-table"><thead><tr><th>BACK NO.</th><th>COMPETITOR / TEAM</th><th>RANK</th></tr></thead><tbody id="body"></tbody></table><button id="save" class="btn dark" style="width:100%;margin-top:16px">심사 저장</button><div id="msg" class="notice"></div></section></main><script src="shared.js"></script><script>
document.getElementById('nav').innerHTML=nav('judge');let E=[],J='김태원';fetch('events.json').then(r=>r.json()).then(x=>{E=x;eventSelect.innerHTML=E.map((e,i)=>`<option value="${i}">${String(e.no).padStart(2,'0')}. ${e.title}${e.subtitle?' · '+e.subtitle:''}</option>`).join('');render()});document.querySelectorAll('.judgebtn').forEach(b=>b.onclick=()=>{J=b.dataset.j;document.querySelectorAll('.judgebtn').forEach(x=>x.classList.toggle('active',x===b));render()});eventSelect.onchange=render;
function render(){if(!E.length)return;let i=+eventSelect.value,e=E[i],all=loadJSON(SCORE_KEY),saved=all[J+'__'+i]||{};eno.textContent='EVENT '+String(e.no).padStart(2,'0');title.textContent=e.title+(e.subtitle?' · '+e.subtitle:'');meta.textContent=e.section+' · '+e.round;body.innerHTML=e.entries.map(p=>`<tr><td>${p.backNo}</td><td><b>${p.name}</b></td><td><input class="rank" type="number" min="1" max="${e.entries.length}" data-back="${p.backNo}" value="${saved[p.backNo]||''}"></td></tr>`).join('');msg.textContent=''}
save.onclick=()=>{let i=+eventSelect.value,all=loadJSON(SCORE_KEY),v={};document.querySelectorAll('.rank').forEach(x=>{if(x.value)v[x.dataset.back]=+x.value});all[J+'__'+i]=v;saveJSON(SCORE_KEY,all);msg.textContent=J+' 심사위원의 순위가 저장되었습니다.'};
</script></body></html>
