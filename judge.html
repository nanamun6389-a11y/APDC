<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>APDC Judge</title><link rel="stylesheet" href="style.css"></head><body class="">
<script src="data.js"></script><script src="app.js"></script><script>requireAdmin();</script>
<div id="nav"></div><main class="wrap"><section class="hero"><h1>Judge</h1><p>GROUP 안의 EVENT를 각각 선택해 별도로 심사합니다.</p></section><section class="panel">
<div id="judgeButtons" class="judge-buttons"></div><select id="groupSelect" class="select"></select><div id="eventTabs" class="event-tabs" style="margin-top:14px"></div>
<div class="kicker" id="eno"></div><div class="bigtitle" id="etitle"></div><div class="meta" id="emeta"></div>
<table class="entry-table"><thead><tr><th>BACK NO.</th><th>COMPETITOR / TEAM</th><th>순위</th></tr></thead><tbody id="body"></tbody></table>
<button id="saveBtn" class="btn dark" style="width:100%;margin-top:16px">이 EVENT 심사 저장</button><div id="msg" class="notice"></div></section></main>
<script>
q('nav').innerHTML=nav('judge');let G=allGroups(),GI=getState().groupIndex||0,EI=0,J=APDC_JUDGES[0].key,ORDER=[];
q('judgeButtons').innerHTML=APDC_JUDGES.map((j,i)=>`<button class="judge-person ${i===0?'active':''}" data-j="${j.key}">${j.label}</button>`).join('');
document.querySelectorAll('.judge-person').forEach(b=>b.onclick=()=>{J=b.dataset.j;document.querySelectorAll('.judge-person').forEach(x=>x.classList.toggle('active',x===b));render()});
q('groupSelect').innerHTML=G.map((g,i)=>`<option value="${i}">GROUP ${String(g.groupNo).padStart(2,'0')} · ${g.title}</option>`).join('');q('groupSelect').value=GI;q('groupSelect').onchange=()=>{GI=+q('groupSelect').value;EI=0;render()};
function cur(){return G[GI].events[EI]}function saved(e){return getScores()[scoreKey(J,e.no)]||{}}function submitted(e){let s=getScores()[scoreKey(J,e.no)]||{};return e.entries.length&&e.entries.every(p=>Number(s[String(p.backNo)])>0)}
function draw(e){q('body').innerHTML=e.entries.map(p=>{let idx=ORDER.indexOf(String(p.backNo)),rank=idx>=0?idx+1:'';return `<tr class="rank-row ${rank?'selected':''}" data-back="${p.backNo}"><td>${p.backNo}</td><td><b>${p.name}</b></td><td><span class="rank-pick">${rank?rank+'위':'누르기'}</span></td></tr>`}).join('');document.querySelectorAll('.rank-row').forEach(r=>r.onclick=()=>{let b=String(r.dataset.back),i=ORDER.indexOf(b);if(i>=0)ORDER.splice(i,1);else ORDER.push(b);draw(e);q('msg').textContent=`${ORDER.length}/${e.entries.length}명 선택`;})}
function render(){let g=G[GI],e=cur();q('eventTabs').innerHTML=g.events.map((x,i)=>`<button class="event-tab ${i===EI?'active':''} ${submitted(x)?'done':''}" data-i="${i}">EVENT ${String(x.no).padStart(2,'0')}<br><small>${submitted(x)?'✓ 저장됨':'○ 미저장'}</small></button>`).join('');document.querySelectorAll('.event-tab').forEach(b=>b.onclick=()=>{EI=+b.dataset.i;render()});let s=saved(e);ORDER=Object.entries(s).sort((a,b)=>a[1]-b[1]).map(([k])=>String(k));q('eno').textContent='EVENT '+String(e.no).padStart(2,'0');q('etitle').textContent=e.title;q('emeta').textContent=e.section+' · '+e.round+' · '+e.entries.length+' entries';draw(e);q('msg').textContent=ORDER.length?'저장된 순위를 불러왔습니다.':'1위부터 순서대로 선수를 눌러 주세요.'}
q('saveBtn').onclick=()=>{let e=cur();if(ORDER.length!==e.entries.length){q('msg').textContent=`모든 선수를 순서대로 선택하세요. (${ORDER.length}/${e.entries.length})`;return}let all=getScores(),v={};ORDER.forEach((b,i)=>v[b]=i+1);all[scoreKey(J,e.no)]=v;saveScores(all);let verify=getScores()[scoreKey(J,e.no)]||{};q('msg').textContent=Object.keys(verify).length===e.entries.length?'심사가 저장되었습니다. ✓':'저장 실패';render()};render();
</script></body></html>
